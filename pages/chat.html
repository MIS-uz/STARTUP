<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — CORE Academy</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    /* Chat Custom Overrides */
    .call-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(97, 28, 255, 0.4) 0%, rgba(5, 11, 20, 0.95) 100%);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .call-overlay.active {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Generated by app.js -->
    </aside>

    <!-- Main Content -->
    <main class="main" style="height:100vh; overflow:hidden">
      <!-- Topbar -->
      <header class="topbar" id="topbar">
        <!-- Generated by app.js -->
      </header>

      <!-- Chat Shell -->
      <div class="chat-shell">
        <!-- Chat List Sidebar -->
        <div class="chat-list">
          <div class="head">
            <input type="text" placeholder="Qidirish..." id="chatSearchInput" oninput="filterChats()">
          </div>
          <div class="chat-tabs">
            <button class="active" onclick="switchChatTab('all', this)">Barchasi</button>
            <button onclick="switchChatTab('group', this)">Guruhlar</button>
            <button onclick="switchChatTab('direct', this)">Shaxsiy</button>
            <button onclick="switchChatTab('channel', this)">Kanallar</button>
          </div>
          <div style="flex:1; overflow-y:auto" id="chatItemsList">
            <!-- Rendered by JS -->
          </div>
        </div>

        <!-- Chat Main Window -->
        <div class="chat-main">
          <!-- Chat Head -->
          <div class="chat-head" id="chatHeadArea">
            <div class="avatar sm" id="activeChatAvatar">C</div>
            <div>
              <h4 id="activeChatName">CORE Guruh</h4>
              <div class="status" id="activeChatStatus">onlayn</div>
            </div>
            <div class="actions">
              <button class="icon-btn" onclick="startCall('voice')" title="Ovozli qo'ng'iroq">📞</button>
              <button class="icon-btn" onclick="startCall('video')" title="Video qo'ng'iroq">📹</button>
              <button class="icon-btn" onclick="showToast('Suhbat sozlamalari', 'info')" title="Batafsil">ℹ️</button>
            </div>
          </div>

          <!-- Chat Body / Message Feed -->
          <div class="chat-body" id="chatBodyArea">
            <!-- Messages rendered by JS -->
          </div>

          <!-- Sticker/Emoji Picker Popup -->
          <div class="sticker-pop" id="emojiPicker">
            <div class="grid-s">
              <button onclick="addEmoji('😀')">😀</button>
              <button onclick="addEmoji('😂')">😂</button>
              <button onclick="addEmoji('🔥')">🔥</button>
              <button onclick="addEmoji('👍')">👍</button>
              <button onclick="addEmoji('🙌')">🙌</button>
              <button onclick="addEmoji('🎓')">🎓</button>
              <button onclick="addEmoji('💻')">💻</button>
              <button onclick="addEmoji('🚀')">🚀</button>
              <button onclick="addEmoji('📚')">📚</button>
              <button onclick="addEmoji('❤️')">❤️</button>
              <button onclick="addEmoji('🎉')">🎉</button>
              <button onclick="addEmoji('👀')">👀</button>
            </div>
          </div>

          <!-- Chat Foot / Input Bar -->
          <div class="chat-foot">
            <button class="ic" onclick="toggleEmojiPicker()" title="Stikerlar & Emojilar">😀</button>
            <button class="ic" onclick="showToast('Fayl yuklash simulyatsiyasi', 'info')" title="Fayl biriktirish">📎</button>
            <input type="text" placeholder="Xabar yozing..." id="messageInput" onkeydown="handleMessageKey(event)">
            <button class="ic send" onclick="sendMessage()" title="Yuborish">➔</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Call Overlay (Simulated Voice/Video Calls) -->
  <div class="call-overlay" id="callOverlay">
    <div class="call-avatar" id="callAvatar">C</div>
    <h2 id="callTargetName">Suhbatdosh</h2>
    <p style="color:var(--muted)" id="callStatusText">Qo'ng'iroq qilinmoqda...</p>
    <div style="display:flex; gap:16px; margin-top:20px">
      <button class="btn btn-red btn-lg" onclick="endCall()">Qo'ng'iroqni tugatish 🚫</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/app.js"></script>
  <script>
    // Initial mock data
    const mockChats = [
      {
        id: 1,
        name: "Ustoz Ahmad Karimov",
        avatar: "AK",
        type: "direct",
        status: "onlayn",
        unread: 2,
        messages: [
          { sender: "them", text: "Salom, uyga vazifani tekshirdim. Yaxshi yozibsiz.", time: "12:30" },
          { sender: "them", text: "Matematikadan keyingi darsimiz ertaga soat 14:00 da.", time: "12:31" }
        ]
      },
      {
        id: 2,
        name: "Python-01 Amaliyot Guruh",
        avatar: "Py",
        type: "group",
        status: "24 a'zo, 3 ta onlayn",
        unread: 5,
        messages: [
          { sender: "them", text: "Assalomu alaykum dars qachon boshlanadi?", name: "Sardor", time: "10:15" },
          { sender: "them", text: "Soat 14:00 da lab darsi bor ekan-ku", name: "Doston", time: "10:17" }
        ]
      },
      {
        id: 3,
        name: "CORE Academy E'lonlar",
        avatar: "📢",
        type: "channel",
        status: "1,240 obunachi",
        unread: 0,
        messages: [
          { sender: "them", text: "📢 Diqqat! Bugungi darslarimiz belgilangan vaqtda boshlanadi. Iltimos o'z vaqtida jonli dars xonalariga kiring.", time: "08:00" }
        ]
      },
      {
        id: 4,
        name: "Boshliq (Admin)",
        avatar: "👔",
        type: "direct",
        status: "oxirgi marta bugun kirgan",
        unread: 0,
        messages: [
          { sender: "them", text: "Salom, markazimiz to'lovini qabul qildik, darslarda faol ishtirok eting.", time: "Kecha" }
        ]
      }
    ];

    let activeChatId = 1;
    let selectedTypeFilter = 'all';

    document.addEventListener('DOMContentLoaded', () => {
      // Initialize app layout
      const user = getCurrentUser() || { role: 'student' };
      initDashboardPage(user.role);

      // Render chat list
      renderChatList();
      selectChat(1);
    });

    // Render list
    function renderChatList() {
      const listArea = document.getElementById('chatItemsList');
      listArea.innerHTML = '';
      
      const filtered = mockChats.filter(chat => {
        if (selectedTypeFilter === 'all') return true;
        return chat.type === selectedTypeFilter;
      });

      filtered.forEach(chat => {
        const lastMsg = chat.messages[chat.messages.length - 1];
        const lastMsgText = lastMsg ? lastMsg.text : 'Xabar yo\'q';
        const lastMsgTime = lastMsg ? lastMsg.time : '';
        const activeClass = chat.id === activeChatId ? 'active' : '';
        const unreadBadge = chat.unread > 0 ? `<span class="unread">${chat.unread}</span>` : '';

        listArea.innerHTML += `
          <div class="chat-item ${activeClass}" onclick="selectChat(${chat.id})">
            <div class="av" style="background:var(--grad-brand)">${chat.avatar}</div>
            <div class="body">
              <div class="n">
                <span class="name">${chat.name}</span>
                <span class="t">${lastMsgTime}</span>
              </div>
              <div class="bot">
                <span class="last">${lastMsgText}</span>
                ${unreadBadge}
              </div>
            </div>
          </div>
        `;
      });
    }

    // Switch tabs
    function switchChatTab(type, btn) {
      selectedTypeFilter = type;
      document.querySelectorAll('.chat-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderChatList();
    }

    // Select active chat
    function selectChat(id) {
      activeChatId = id;
      const chat = mockChats.find(c => c.id === id);
      if (!chat) return;

      // Reset unread
      chat.unread = 0;
      renderChatList();

      // Set head details
      document.getElementById('activeChatName').innerText = chat.name;
      document.getElementById('activeChatStatus').innerText = chat.status;
      document.getElementById('activeChatAvatar').innerText = chat.avatar;

      // Render messages
      const bodyArea = document.getElementById('chatBodyArea');
      bodyArea.innerHTML = '';

      chat.messages.forEach(msg => {
        const typeClass = msg.sender === 'me' ? 'me' : 'them';
        const senderName = (chat.type === 'group' && msg.sender !== 'me') ? `<div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:2px">${msg.name || 'Guruhdoshingiz'}</div>` : '';
        bodyArea.innerHTML += `
          <div class="msg ${typeClass}">
            ${senderName}
            <div>${msg.text}</div>
            <span class="t">${msg.time}</span>
          </div>
        `;
      });

      // Scroll to bottom
      bodyArea.scrollTop = bodyArea.scrollHeight;
    }

    // Filter list by input
    function filterChats() {
      const query = document.getElementById('chatSearchInput').value.toLowerCase();
      document.querySelectorAll('.chat-item').forEach((el, index) => {
        const chat = mockChats[index];
        if (chat && chat.name.toLowerCase().includes(query)) {
          el.style.display = 'flex';
        } else {
          el.style.display = 'none';
        }
      });
    }

    // Send Message
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;

      const chat = mockChats.find(c => c.id === activeChatId);
      if (!chat) return;

      const now = new Date();
      const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

      // Push to data & update UI
      chat.messages.push({ sender: 'me', text: text, time: timeStr });
      input.value = '';
      selectChat(activeChatId);

      // Simulated auto-reply
      if (chat.type !== 'channel') {
        setTimeout(() => {
          chat.messages.push({
            sender: 'them',
            text: `Tushunarli! Xabar qabul qilindi. Bu avtomatik simulyatsiya qilingan javob. 👍`,
            time: timeStr
          });
          selectChat(activeChatId);
          showToast(`Yangi xabar keldi: ${chat.name}`, 'info');
        }, 1500);
      }
    }

    function handleMessageKey(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    // Call Actions
    function startCall(type) {
      const chat = mockChats.find(c => c.id === activeChatId);
      document.getElementById('callTargetName').innerText = chat.name;
      document.getElementById('callAvatar').innerText = chat.avatar;
      document.getElementById('callStatusText').innerText = `${type === 'voice' ? 'Ovozli' : 'Video'} aloqa ulanmoqda...`;
      document.getElementById('callOverlay').classList.add('active');
    }

    function endCall() {
      document.getElementById('callOverlay').classList.remove('active');
      showToast('Qo\'ng\'iroq yakunlandi.', 'info');
    }

    // Emoji/Sticker actions
    function toggleEmojiPicker() {
      document.getElementById('emojiPicker').classList.toggle('open');
    }

    function addEmoji(emoji) {
      const input = document.getElementById('messageInput');
      input.value += emoji;
      toggleEmojiPicker();
      input.focus();
    }
  </script>
</body>
</html>
