<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jonli Dars Xonasi — CORE Academy</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    /* Whiteboard custom CSS */
    .whiteboard-container {
      position: absolute;
      inset: 0;
      background: #111;
      display: none;
      flex-direction: column;
      z-index: 5;
    }
    .whiteboard-container.active {
      display: flex;
    }
    #whiteboardCanvas {
      flex: 1;
      background: #fafafa;
      cursor: crosshair;
    }
    .wb-controls {
      display: flex;
      gap: 10px;
      padding: 8px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Generated by app.js -->
    </aside>

    <!-- Main Content -->
    <main class="main" style="height:100vh; overflow:hidden">
      <!-- Topbar -->
      <header class="topbar" id="topbar">
        <!-- Generated by app.js -->
      </header>

      <!-- Live Lesson Room -->
      <div class="lesson-room">
        <!-- Left: Video / Whiteboard Area -->
        <div class="lesson-video">
          <!-- Spotlight / Camera preview -->
          <div class="video-area" id="mainVideoSpotlight">
            <div class="teacher-cam" id="teacherCamVisual">👨‍🏫</div>
            <div style="position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; font-size:12px">
              Ustoz: Alex Lee (Jonli Efir)
            </div>
            <div style="position:absolute; top:20px; right:20px; display:flex; gap:8px">
              <span class="pill red">● REC</span>
              <span class="pill blue">00:42:15</span>
            </div>
          </div>

          <!-- Interactive Whiteboard Canvas -->
          <div class="whiteboard-container" id="whiteboardWrapper">
            <div class="wb-controls">
              <span style="color:var(--text); font-weight:600; font-size:13px; margin-right:10px">✏️ Interaktiv Doska</span>
              <input type="color" id="brushColor" value="#1A8CFF" style="width:30px; height:24px; border:0; background:transparent">
              <input type="range" id="brushSize" min="1" max="15" value="3" style="width:70px">
              <button onclick="clearWhiteboard()" class="btn btn-sm btn-ghost" style="margin-left:auto">Tozalash</button>
              <button onclick="toggleWhiteboard(false)" class="btn btn-sm btn-red">Darsga qaytish</button>
            </div>
            <canvas id="whiteboardCanvas"></canvas>
          </div>

          <!-- Bottom: Video Room Controls -->
          <div class="video-controls">
            <button onclick="toggleControl('mic', this)" title="Mikrofon">🎤</button>
            <button onclick="toggleControl('camera', this)" title="Kamera">📷</button>
            <button onclick="toggleControl('screen', this)" title="Ekranni ulash">🖥️</button>
            <button onclick="toggleWhiteboard(true)" title="Doska" class="btn-outline-brand" style="border-radius:50%">✏️</button>
            <button onclick="showToast('Siz qo\'l ko\'tardingiz. Ustozga xabar berildi', 'info')" title="Qo'l ko'tarish">✋</button>
            <button onclick="leaveRoom()" class="danger" title="Darsdan chiqish">🚪</button>
          </div>
        </div>

        <!-- Right: In-class Chat & Participant List -->
        <div class="lesson-sidebar">
          <div class="card-title" style="padding:14px; border-bottom:1px solid var(--border); margin-bottom:0">
            <h3>👥 Darsdagi faollar</h3>
          </div>
          <div style="padding:10px; display:flex; gap:4px; overflow-x:auto; border-bottom:1px solid var(--border)">
            <span class="avatar sm online" title="Sardor Aliyev">SA</span>
            <span class="avatar sm online" title="Madina Karilova">MK</span>
            <span class="avatar sm online" title="Doston Oripov">DO</span>
            <span class="avatar sm online" title="Nigora Ziyodova">NZ</span>
            <span class="avatar sm" title="Bekzod Komilov">BK</span>
          </div>

          <div style="flex:1; display:flex; flex-direction:column; overflow:hidden">
            <div class="card-title" style="padding:14px 14px 6px; margin-bottom:0">
              <h3>💬 Sinf Xonasi Chati</h3>
            </div>
            
            <!-- Class chat feed -->
            <div style="flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:8px" id="classChatArea">
              <div class="msg them" style="max-width:90%">
                <div style="font-size:10px; color:var(--gold); font-weight:700">Doston Oripov</div>
                <div>Assalomu alaykum ustoz, ovozingiz yaxshi eshitilyapti!</div>
                <span class="t">09:02</span>
              </div>
              <div class="msg them" style="max-width:90%">
                <div style="font-size:10px; color:var(--gold); font-weight:700">Madina Karilova</div>
                <div>Bugungi dars mavzusi bo'yicha slaydlarni yuklaysizmi?</div>
                <span class="t">09:05</span>
              </div>
            </div>

            <!-- Class chat input -->
            <div class="chat-foot" style="border-top:1px solid var(--border)">
              <input type="text" placeholder="Guruhga yozish..." id="classChatInput" onkeydown="handleClassChatKey(event)">
              <button class="ic send" onclick="sendClassChatMessage()">➔</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="../js/app.js"></script>
  <script>
    let isDrawing = false;
    let canvas, ctx;
    let micActive = true;
    let cameraActive = true;
    let screenActive = false;

    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser() || { role: 'student' };
      initDashboardPage(user.role);

      // Initialize canvas
      canvas = document.getElementById('whiteboardCanvas');
      ctx = canvas.getContext('2d');
      setupCanvasListeners();

      // Attendance Notification
      setTimeout(() => {
        showToast("Davomat: Jonli darsdagi ishtirokingiz tasdiqlandi. 🟢", "success");
      }, 3000);
    });

    // Control toggles
    function toggleControl(type, btn) {
      if (type === 'mic') {
        micActive = !micActive;
        btn.classList.toggle('active', !micActive);
        btn.innerText = micActive ? '🎤' : '🎙️';
        showToast(micActive ? 'Mikrofon yoqildi' : 'Mikrofon o\'chirildi', micActive ? 'success' : 'warning');
      } else if (type === 'camera') {
        cameraActive = !cameraActive;
        btn.classList.toggle('active', !cameraActive);
        btn.innerText = cameraActive ? '📷' : '📹';
        document.getElementById('teacherCamVisual').style.display = cameraActive ? 'grid' : 'none';
        showToast(cameraActive ? 'Kamera yoqildi' : 'Kamera o\'chirildi', cameraActive ? 'success' : 'warning');
      } else if (type === 'screen') {
        screenActive = !screenActive;
        btn.classList.toggle('active', screenActive);
        showToast(screenActive ? 'Ekraningiz ulashilmoqda' : 'Ekranni ulashish to\'xtatildi', 'info');
      }
    }

    // Toggle whiteboard
    function toggleWhiteboard(show) {
      const wrapper = document.getElementById('whiteboardWrapper');
      if (show) {
        wrapper.classList.add('active');
        // Fit canvas to screen
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight - 40;
      } else {
        wrapper.classList.remove('active');
      }
    }

    // Whiteboard Canvas Drawing Logic
    function setupCanvasListeners() {
      canvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
      });
      canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.strokeStyle = document.getElementById('brushColor').value;
        ctx.lineWidth = document.getElementById('brushSize').value;
        ctx.lineCap = 'round';
        ctx.stroke();
      });
      canvas.addEventListener('mouseup', () => isDrawing = false);
      canvas.addEventListener('mouseleave', () => isDrawing = false);
    }

    function clearWhiteboard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      showToast('Doska tozalandi', 'info');
    }

    function leaveRoom() {
      showToast('Jonli darsni tark etdingiz.', 'warning');
      setTimeout(() => {
        const user = getCurrentUser() || { role: 'student' };
        window.location.href = ROLES[user.role].dashboard;
      }, 1000);
    }

    // In-class chat
    function sendClassChatMessage() {
      const input = document.getElementById('classChatInput');
      const text = input.value.trim();
      if (!text) return;

      const user = getCurrentUser() || { name: 'Siz' };
      const chatArea = document.getElementById('classChatArea');
      const now = new Date();
      const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

      chatArea.innerHTML += `
        <div class="msg me" style="max-width:90%">
          <div>${text}</div>
          <span class="t">${timeStr}</span>
        </div>
      `;

      input.value = '';
      chatArea.scrollTop = chatArea.scrollHeight;

      // Simulated teacher reply
      setTimeout(() => {
        chatArea.innerHTML += `
          <div class="msg them" style="max-width:90%">
            <div style="font-size:10px; color:var(--violet-light); font-weight:700">Ustoz Alex Lee</div>
            <div>Juda yaxshi savol, ${user.name}! Hozir doskada shu misolni yechib ko'rsataman.</div>
            <span class="t">${timeStr}</span>
          </div>
        `;
        chatArea.scrollTop = chatArea.scrollHeight;
        showToast("Ustoz xabar yozdi", "info");
      }, 2000);
    }

    function handleClassChatKey(event) {
      if (event.key === 'Enter') {
        sendClassChatMessage();
      }
    }
  </script>
</body>
</html>
