<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mening Profilim — CORE Academy</title>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    /* Profile styling overrides */
    .profile-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
    }
    @media (max-width: 900px) {
      .profile-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Generated by app.js -->
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Topbar -->
      <header class="topbar" id="topbar">
        <!-- Generated by app.js -->
      </header>

      <!-- Content Area -->
      <section class="content">
        <div class="page-title">
          <div>
            <h1>👤 Profil va Sozlamalar</h1>
            <p>Ma'lumotlaringizni tahrirlang, parolingizni yangilang va platforma sozlamalarini sozlang.</p>
          </div>
        </div>

        <div class="profile-grid">
          <!-- Left: Profile Card with Avatar Upload -->
          <div class="card card-pad text-center" style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px">
            <div class="avatar xl" id="profileVisualAvatar">U</div>
            <div>
              <h3 id="profileNameDisplay" style="font-size:18px">Demo User</h3>
              <p id="profileRoleDisplay" style="color:var(--muted); font-size:12px; margin-top:2px">🎓 O'quvchi</p>
            </div>
            
            <button onclick="showToast('Rasm yuklash simulyatsiyasi', 'info')" class="btn btn-sm btn-ghost">Rasmni o'zgartirish 📷</button>
            
            <div style="width:100%; border-top:1px solid var(--border); padding-top:16px; font-size:12.5px; text-align:left; color:var(--muted)">
              <div style="margin-bottom:8px">📧 <strong style="color:var(--text)">Email:</strong> <span id="profileEmailDisplay">demo@coreacademy.uz</span></div>
              <div>📅 <strong style="color:var(--text)">A'zolik:</strong> 2026-yil, Fevral</div>
            </div>
          </div>

          <!-- Right: Profile Details Form & Settings -->
          <div style="display:flex; flex-direction:column; gap:20px">
            <!-- Form Card -->
            <div class="card card-pad">
              <div class="card-title">
                <h3>Tafsilotlarni Tahrirlash</h3>
              </div>
              <form onsubmit="saveProfileDetails(event)">
                <div class="grid grid-2">
                  <div class="field">
                    <label for="editName">To'liq ism-sharifingiz</label>
                    <input type="text" id="editName" value="Demo User" required>
                  </div>
                  <div class="field">
                    <label for="editPhone">Telefon raqamingiz</label>
                    <input type="text" id="editPhone" value="+998 (90) 123-45-67">
                  </div>
                </div>
                <div class="field">
                  <label for="editEmail">E-pochta manzili</label>
                  <input type="email" id="editEmail" value="demo@coreacademy.uz" required>
                </div>
                <button type="submit" class="btn btn-primary">O'zgarishlarni Saqlash</button>
              </form>
            </div>

            <!-- Security & Password Change -->
            <div class="card card-pad">
              <div class="card-title">
                <h3>Xavfsizlik (Parolni o'zgartirish)</h3>
              </div>
              <form onsubmit="changePassword(event)">
                <div class="field">
                  <label for="currentPass">Amaldagi parol</label>
                  <input type="password" id="currentPass" placeholder="••••••••" required>
                </div>
                <div class="grid grid-2">
                  <div class="field">
                    <label for="newPass">Yangi parol</label>
                    <input type="password" id="newPass" placeholder="Kamida 6 belgi" required minlength="6">
                  </div>
                  <div class="field">
                    <label for="confirmPass">Yangi parolni tasdiqlash</label>
                    <input type="password" id="confirmPass" placeholder="Kamida 6 belgi" required minlength="6">
                  </div>
                </div>
                <button type="submit" class="btn btn-ghost">Parolni Yangilash</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Scripts -->
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser() || { name: 'Demo User', role: 'student', email: 'demo@coreacademy.uz' };
      initDashboardPage(user.role);

      // Fill in user data
      document.getElementById('editName').value = user.name;
      document.getElementById('editEmail').value = user.email;
      document.getElementById('profileNameDisplay').innerText = user.name;
      document.getElementById('profileEmailDisplay').innerText = user.email;
      document.getElementById('profileRoleDisplay').innerText = `${ROLES[user.role].icon} ${ROLES[user.role].label}`;
      document.getElementById('profileVisualAvatar').innerText = user.name.charAt(0).toUpperCase();
    });

    function saveProfileDetails(event) {
      event.preventDefault();
      const user = getCurrentUser() || { role: 'student' };
      
      user.name = document.getElementById('editName').value;
      user.email = document.getElementById('editEmail').value;
      
      setCurrentUser(user);
      
      document.getElementById('profileNameDisplay').innerText = user.name;
      document.getElementById('profileEmailDisplay').innerText = user.email;
      document.getElementById('profileVisualAvatar').innerText = user.name.charAt(0).toUpperCase();

      // Refresh sidebar details
      buildSidebar(user.role);

      showToast('Profil ma\'lumotlari muvaffaqiyatli saqlandi! ✅', 'success');
    }

    function changePassword(event) {
      event.preventDefault();
      const nPass = document.getElementById('newPass').value;
      const cPass = document.getElementById('confirmPass').value;

      if (nPass !== cPass) {
        showToast('Yangi parollar mos kelmadi!', 'error');
        return;
      }

      showToast('Parol muvaffaqiyatli o\'zgartirildi! ✅', 'success');
      document.getElementById('currentPass').value = '';
      document.getElementById('newPass').value = '';
      document.getElementById('confirmPass').value = '';
    }
  </script>
</body>
</html>
